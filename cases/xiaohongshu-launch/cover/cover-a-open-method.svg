<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <style>
      .bg { fill: #f7f4ef; }
      .ink { fill: #1f1f1f; font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .muted { fill: #68605a; font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .mono { fill: #7a716b; font-family: "SF Mono", "Menlo", "Consolas", monospace; }
      .title { font-size: 142px; font-weight: 900; letter-spacing: -4px; }
      .subtitle { font-size: 46px; font-weight: 700; }
      .label { font-size: 32px; font-weight: 800; }
      .small { font-size: 26px; font-weight: 650; }
      .micro { font-size: 22px; font-weight: 650; }
    </style>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#211b16" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1440"/>
  <rect x="56" y="56" width="968" height="1328" rx="46" fill="#fffaf3" stroke="#26211c" stroke-width="3"/>

  <rect x="84" y="92" width="184" height="58" rx="29" fill="#e83f4f"/>
  <text x="176" y="132" text-anchor="middle" fill="#fffaf3" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="800">开源 Skill</text>

  <text class="mono" x="982" y="130" text-anchor="end" font-size="23" font-weight="700">social-media-skills</text>

  <text class="ink title" x="86" y="312">不只</text>
  <text class="ink title" x="86" y="468">写文案</text>

  <rect x="92" y="522" width="566" height="72" rx="20" fill="#1f1f1f"/>
  <text x="375" y="571" text-anchor="middle" fill="#fffaf3" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="37" font-weight="800">封面 / 图文 / 三平台内容包</text>

  <g filter="url(#softShadow)">
    <rect x="86" y="690" width="276" height="326" rx="34" fill="#ffffff" stroke="#2c2620" stroke-width="3"/>
    <rect x="112" y="722" width="124" height="40" rx="20" fill="#f1ebe2"/>
    <text class="label ink" x="124" y="834">公众号</text>
    <text class="muted small" x="124" y="886">长文</text>
    <text class="muted small" x="124" y="928">标题</text>
    <text class="muted small" x="124" y="970">摘要</text>
    <circle cx="300" cy="748" r="28" fill="#e83f4f"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="402" y="650" width="276" height="366" rx="34" fill="#1f1f1f"/>
    <rect x="430" y="684" width="124" height="40" rx="20" fill="#e83f4f"/>
    <text x="464" y="798" fill="#fffaf3" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="42" font-weight="900">小红书</text>
    <text x="464" y="858" fill="#f7f4ef" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="750">封面</text>
    <text x="464" y="904" fill="#f7f4ef" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="750">图文卡片</text>
    <text x="464" y="950" fill="#f7f4ef" font-family="PingFang SC, Hiragino Sans GB, Noto Sans CJK SC, Microsoft YaHei, sans-serif" font-size="28" font-weight="750">发布文案</text>
    <path d="M610 702 L626 734 L660 738 L635 760 L642 794 L610 776 L579 794 L586 760 L561 738 L594 734 Z" fill="#f7d24a"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="718" y="690" width="276" height="326" rx="34" fill="#ffffff" stroke="#2c2620" stroke-width="3"/>
    <rect x="744" y="722" width="104" height="40" rx="20" fill="#f1ebe2"/>
    <text class="label ink" x="756" y="834">抖音</text>
    <text class="muted small" x="756" y="886">口播</text>
    <text class="muted small" x="756" y="928">钩子</text>
