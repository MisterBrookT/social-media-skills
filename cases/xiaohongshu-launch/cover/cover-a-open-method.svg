  <path d="M122 1136 H958" stroke="#2c2620" stroke-width="3" stroke-linecap="round"/>
  <text class="ink subtitle" x="122" y="1224">一套内容资产</text>
  <text class="muted small" x="122" y="1284">先跑小红书封面，再扩展图文和发布文案</text>
  <text class="mono" x="122" y="1336">github.com/MisterBrookT/social-media-skills</text>
