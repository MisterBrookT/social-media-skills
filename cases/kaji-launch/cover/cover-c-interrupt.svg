<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <style>
      .bg { fill: #f4f7f6; }
      .ink { fill: #151b1f; }
      .muted { fill: #5d6a72; }
      .blue { fill: #5f8eac; }
      .red { fill: #ef4056; }
      .soft { fill: #e8efed; }
      .white { fill: #ffffff; }
      .stroke { stroke: #151b1f; stroke-width: 6; fill: none; }
      .thin { stroke: #d7e1df; stroke-width: 3; fill: none; }
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; }
    </style>
  </defs>

  <rect class="bg" width="1080" height="1440"/>

  <rect x="72" y="70" width="936" height="1300" rx="44" class="white"/>
  <rect x="72" y="70" width="936" height="1300" rx="44" class="stroke"/>

  <rect x="112" y="116" width="856" height="72" rx="36" class="ink"/>
  <text x="150" y="162" font-size="28" font-weight="750" fill="#ffffff">Kaji</text>
  <circle cx="758" cy="152" r="26" fill="#ffffff"/>
  <circle cx="820" cy="152" r="26" fill="#5f8eac"/>
  <text x="928" y="162" class="mono" font-size="28" font-weight="800" fill="#ffffff" text-anchor="end">16:20</text>

  <text x="116" y="330" class="ink" font-size="104" font-weight="900">别等额度</text>
  <text x="116" y="460" class="ink" font-size="104" font-weight="900">跳出来</text>

  <rect x="116" y="510" width="530" height="74" rx="37" class="red"/>
  <text x="381" y="559" fill="#ffffff" font-size="34" font-weight="800" text-anchor="middle">用量 / token / 休息</text>

  <text x="116" y="655" class="muted" font-size="38" font-weight="750">先看住，再继续跑长任务</text>

  <rect x="116" y="730" width="848" height="410" rx="42" fill="#f9fbfb"/>
  <rect x="116" y="730" width="848" height="410" rx="42" class="stroke"/>

  <rect x="160" y="774" width="760" height="66" rx="33" class="soft"/>
  <text x="202" y="818" class="ink" font-size="30" font-weight="800">Codex</text>
  <text x="812" y="818" class="blue" font-size="30" font-weight="850" text-anchor="end">running</text>

  <text x="176" y="900" class="ink" font-size="32" font-weight="850">5h 用量</text>
  <rect x="176" y="930" width="330" height="26" rx="13" class="soft"/>
  <rect x="176" y="930" width="236" height="26" rx="13" class="blue"/>
  <text x="552" y="957" class="ink" font-size="31" font-weight="850">还够跑</text>

  <text x="176" y="1016" class="ink" font-size="32" font-weight="850">token 压力</text>
  <rect x="176" y="1046" width="330" height="26" rx="13" class="soft"/>
  <rect x="176" y="1046" width="278" height="26" rx="13" class="red"/>
  <text x="552" y="1073" class="red" font-size="31" font-weight="900">偏高</text>

  <rect x="706" y="903" width="150" height="150" rx="36" class="white"/>
  <rect x="706" y="903" width="150" height="150" rx="36" class="thin"/>
  <path d="M742 984 C 770 932, 806 1030, 842 956" stroke="#5f8eac" stroke-width="11" fill="none" stroke-linecap="round"/>
  <text x="780" y="1108" class="muted" font-size="28" font-weight="800" text-anchor="middle">状态层</text>

  <text x="116" y="1246" class="ink" font-size="46" font-weight="900">Kaji 开源</text>
  <text x="116" y="1302" class="muted" font-size="32" font-weight="750">macOS AI coding 状态层</text>
