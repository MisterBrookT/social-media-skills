<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <style>
      .bg { fill: #f7f7f4; }
      .ink { fill: #171a18; }
      .muted { fill: #626760; }
      .line { stroke: #cfd2cc; stroke-width: 2; }
      .accent { fill: #60645c; }
      .soft { fill: #eceee9; }
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; }
    </style>
    <clipPath id="shotClip">
      <rect x="104" y="640" width="872" height="540" rx="26"/>
    </clipPath>
    <filter id="shotShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#101010" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1440"/>

  <text x="82" y="156" class="mono muted" font-size="30" font-weight="800">Kaji</text>
  <text x="82" y="298" class="ink" font-size="120" font-weight="950">别等额度</text>
  <text x="82" y="430" class="ink" font-size="120" font-weight="950">跳出来</text>

  <rect x="82" y="476" width="560" height="68" rx="34" fill="#ffffff" stroke="#c7cac4" stroke-width="2"/>
  <text x="362" y="520" class="ink" font-size="32" font-weight="760" text-anchor="middle">AI coding 状态先进菜单栏</text>

  <text x="736" y="510" class="muted" font-size="31" font-weight="760">用量 / token / 休息</text>
  <path d="M736 536 C 810 552, 906 552, 990 530" stroke="#60645c" stroke-width="5" fill="none" stroke-linecap="round"/>

  <g filter="url(#shotShadow)">
    <rect x="104" y="640" width="872" height="540" rx="26" fill="#ffffff"/>
    <image href="assets/kaji-gauge-current.png" x="104" y="640" width="872" height="540" preserveAspectRatio="xMidYMin slice" clip-path="url(#shotClip)"/>
  </g>

  <g transform="translate(82 1262)">
    <text x="0" y="0" class="ink" font-size="34" font-weight="850">额度可见</text>
    <text x="0" y="48" class="muted" font-size="27" font-weight="700">5h / 7d 不盲跑</text>
  </g>

  <line x1="360" y1="1234" x2="360" y2="1366" class="line"/>

  <g transform="translate(424 1262)">
    <text x="0" y="0" class="ink" font-size="34" font-weight="850">状态收束</text>
    <text x="0" y="48" class="muted" font-size="27" font-weight="700">多模型一屏看</text>
  </g>

  <line x1="716" y1="1234" x2="716" y2="1366" class="line"/>

  <g transform="translate(780 1262)">
    <text x="0" y="0" class="ink" font-size="34" font-weight="850">少打断</text>
    <text x="0" y="48" class="muted" font-size="27" font-weight="700">长任务更稳</text>
  </g>
</svg>
