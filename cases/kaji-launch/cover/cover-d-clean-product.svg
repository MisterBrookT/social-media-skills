<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1440" viewBox="0 0 1080 1440">
  <defs>
    <style>
      .bg { fill: #f6f8f5; }
      .ink { fill: #161a18; }
      .muted { fill: #626b65; }
      .line { stroke: #cfd5d0; stroke-width: 2; }
      .accent { fill: #5c86a3; }
      .accent2 { fill: #16a56f; }
      .soft { fill: #eef2ee; }
      text { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", "Microsoft YaHei", sans-serif; }
      .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, monospace; }
    </style>
    <clipPath id="shotClip">
      <rect x="114" y="590" width="852" height="650" rx="28"/>
    </clipPath>
    <filter id="shotShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="22" stdDeviation="22" flood-color="#101010" flood-opacity="0.12"/>
    </filter>
  </defs>

  <rect class="bg" width="1080" height="1440"/>

  <text x="82" y="156" class="ink" font-size="78" font-weight="950">Kaji</text>
  <text x="262" y="154" class="accent" font-size="29" font-weight="850">macOS 菜单栏工具</text>

  <text x="82" y="292" class="ink" font-size="94" font-weight="950">AI Coding</text>
  <text x="82" y="404" class="accent" font-size="94" font-weight="950">一站式状态栏</text>

  <rect x="82" y="468" width="610" height="68" rx="34" fill="#ffffff" stroke="#c7cac4" stroke-width="2"/>
  <text x="387" y="512" class="ink" font-size="32" font-weight="760" text-anchor="middle">用量 / 成本 / 压力 一眼看住</text>

  <circle cx="760" cy="502" r="9" class="accent2"/>
  <text x="786" y="513" class="muted" font-size="31" font-weight="760">长任务少打断</text>
  <path d="M786 536 C 846 548, 918 546, 982 528" stroke="#5c86a3" stroke-width="5" fill="none" stroke-linecap="round"/>

  <g filter="url(#shotShadow)">
    <rect x="114" y="590" width="852" height="650" rx="28" fill="#ffffff"/>
    <image href="assets/kaji-gauge-current.png" x="114" y="590" width="852" height="864" preserveAspectRatio="xMidYMin slice" clip-path="url(#shotClip)"/>
  </g>

  <g transform="translate(82 1308)">
    <text x="0" y="0" class="ink" font-size="32" font-weight="850">额度可见</text>
    <text x="0" y="44" class="muted" font-size="25" font-weight="700">5h / 7d 不盲跑</text>
  </g>

  <line x1="360" y1="1282" x2="360" y2="1378" class="line"/>

  <g transform="translate(424 1308)">
    <text x="0" y="0" class="ink" font-size="32" font-weight="850">状态收束</text>
    <text x="0" y="44" class="muted" font-size="25" font-weight="700">多模型一屏看</text>
  </g>

  <line x1="716" y1="1282" x2="716" y2="1378" class="line"/>

  <g transform="translate(780 1308)">
    <text x="0" y="0" class="ink" font-size="32" font-weight="850">少打断</text>
    <text x="0" y="44" class="muted" font-size="25" font-weight="700">长任务更稳</text>
  </g>
</svg>
